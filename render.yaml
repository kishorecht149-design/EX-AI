services:
  - type: web
    name: ex-ai
    runtime: python
    buildCommand: pip install -r requirements.txt && python dataset/generate_synthetic.py --samples 300 && python train_model.py --n-estimators 120
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
